<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Cosmic shock animation</title>
  <desc id="desc">Sunset to deep space, moon fracture into particles, crescent lock-in, then endless spark field and aurora pulses.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ec2ff">
        <animate attributeName="stop-color" dur="16s" repeatCount="indefinite" values="#6ec2ff;#ff8b5a;#15183e;#070a1d;#15183e;#6ec2ff" keyTimes="0;0.2;0.45;0.62;0.82;1"/>
      </stop>
      <stop offset="100%" stop-color="#ffd89b">
        <animate attributeName="stop-color" dur="16s" repeatCount="indefinite" values="#ffd89b;#9b5b64;#111431;#060a1a;#111431;#ffd89b" keyTimes="0;0.2;0.45;0.62;0.82;1"/>
      </stop>
    </linearGradient>

    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2b3"/>
      <stop offset="70%" stop-color="#ffd66b"/>
      <stop offset="100%" stop-color="#ffd66b" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="planetFog" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6dd3ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6dd3ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bgGrad)"/>

  <!-- Horizon -->
  <path d="M0 275 C 180 245, 340 300, 520 278 C 700 255, 860 305, 1200 262 L1200 360 L0 360 Z" fill="#090d24" opacity="0.55"/>
  <path d="M0 290 C 180 255, 340 315, 520 292 C 700 268, 860 322, 1200 276 L1200 360 L0 360 Z" fill="#02040f" opacity="0.85"/>

  <!-- Sun with orbital path -->
  <g filter="url(#softGlow)">
    <circle cx="120" cy="285" r="58" fill="url(#sunCore)" opacity="0">
      <animate attributeName="opacity" dur="16s" repeatCount="indefinite" values="0;1;1;0;0;0" keyTimes="0;0.05;0.35;0.48;0.7;1"/>
      <animateMotion dur="16s" repeatCount="indefinite" path="M0 0 Q 320 -220 680 0"/>
    </circle>
    <circle cx="120" cy="285" r="24" fill="#ffd260" opacity="0">
      <animate attributeName="opacity" dur="16s" repeatCount="indefinite" values="0;1;1;0;0;0" keyTimes="0;0.05;0.35;0.48;0.7;1"/>
      <animateMotion dur="16s" repeatCount="indefinite" path="M0 0 Q 320 -220 680 0"/>
    </circle>
  </g>

  <!-- Moon enters -->
  <g>
    <circle cx="920" cy="95" r="30" fill="#f5f8ff" opacity="0">
      <animate attributeName="opacity" dur="16s" repeatCount="indefinite" values="0;0;0;0.95;0.95;0" keyTimes="0;0.45;0.52;0.58;0.68;1"/>
    </circle>
    <circle cx="932" cy="88" r="24" fill="#0b1030" opacity="0">
      <animate attributeName="opacity" dur="16s" repeatCount="indefinite" values="0;0;0;0;0.95;0" keyTimes="0;0.58;0.61;0.64;0.95;1"/>
    </circle>
  </g>

  <!-- Moon fracture shockwave -->
  <g fill="#dce7ff" opacity="0">
    <animate attributeName="opacity" dur="16s" repeatCount="indefinite" values="0;0;0;1;0;0" keyTimes="0;0.58;0.6;0.63;0.68;1"/>

    <circle cx="920" cy="95" r="3.8"><animate attributeName="cx" dur="16s" repeatCount="indefinite" values="920;920;920;980;1020;1020" keyTimes="0;0.6;0.61;0.66;0.75;1"/></circle>
    <circle cx="920" cy="95" r="3.2"><animate attributeName="cx" dur="16s" repeatCount="indefinite" values="920;920;920;860;820;820" keyTimes="0;0.6;0.61;0.66;0.75;1"/></circle>
    <circle cx="920" cy="95" r="2.8"><animate attributeName="cy" dur="16s" repeatCount="indefinite" values="95;95;95;35;20;20" keyTimes="0;0.6;0.61;0.66;0.75;1"/></circle>
    <circle cx="920" cy="95" r="2.9"><animate attributeName="cy" dur="16s" repeatCount="indefinite" values="95;95;95;155;185;185" keyTimes="0;0.6;0.61;0.66;0.75;1"/></circle>
    <circle cx="920" cy="95" r="2.4">
      <animate attributeName="cx" dur="16s" repeatCount="indefinite" values="920;920;920;972;1010;1010" keyTimes="0;0.6;0.61;0.66;0.75;1"/>
      <animate attributeName="cy" dur="16s" repeatCount="indefinite" values="95;95;95;58;44;44" keyTimes="0;0.6;0.61;0.66;0.75;1"/>
    </circle>
  </g>

  <!-- Aurora bands after crescent lock -->
  <g opacity="0.32">
    <path d="M-60 140 C 120 90, 310 170, 500 120 C 690 72, 920 175, 1260 90" stroke="#51f2ff" stroke-width="7" fill="none" filter="url(#softGlow)">
      <animate attributeName="opacity" dur="16s" repeatCount="indefinite" values="0;0;0;0;0.65;0.12;0" keyTimes="0;0.58;0.62;0.68;0.76;0.92;1"/>
      <animate attributeName="d" dur="8s" repeatCount="indefinite" values="M-60 140 C 120 90, 310 170, 500 120 C 690 72, 920 175, 1260 90;M-60 120 C 120 160, 310 90, 500 145 C 690 195, 920 95, 1260 140;M-60 140 C 120 90, 310 170, 500 120 C 690 72, 920 175, 1260 90"/>
    </path>
  </g>

  <!-- Planet-like fog pulse -->
  <circle cx="270" cy="170" r="120" fill="url(#planetFog)">
    <animate attributeName="opacity" dur="16s" repeatCount="indefinite" values="0.08;0.02;0.25;0.1;0.08" keyTimes="0;0.28;0.56;0.82;1"/>
  </circle>

  <!-- Infinite spark field -->
  <g fill="#ffffff">
    <circle cx="730" cy="55" r="1.8"><animate attributeName="opacity" dur="2.2s" repeatCount="indefinite" values="0.1;1;0.1"/></circle>
    <circle cx="770" cy="80" r="1.4"><animate attributeName="opacity" dur="2.9s" repeatCount="indefinite" values="0.08;1;0.08"/></circle>
    <circle cx="820" cy="48" r="1.6"><animate attributeName="opacity" dur="2.3s" begin="0.4s" repeatCount="indefinite" values="0.1;1;0.1"/></circle>
    <circle cx="860" cy="70" r="1.3"><animate attributeName="opacity" dur="1.8s" begin="0.8s" repeatCount="indefinite" values="0.12;1;0.12"/></circle>
    <circle cx="910" cy="45" r="1.7"><animate attributeName="opacity" dur="2.5s" begin="0.6s" repeatCount="indefinite" values="0.06;1;0.06"/></circle>
    <circle cx="960" cy="74" r="1.2"><animate attributeName="opacity" dur="2.1s" begin="0.9s" repeatCount="indefinite" values="0.07;1;0.07"/></circle>
    <circle cx="1010" cy="50" r="1.9"><animate attributeName="opacity" dur="2.8s" begin="0.2s" repeatCount="indefinite" values="0.1;1;0.1"/></circle>
    <circle cx="1065" cy="82" r="1.5"><animate attributeName="opacity" dur="2.4s" begin="1s" repeatCount="indefinite" values="0.09;1;0.09"/></circle>
    <circle cx="1120" cy="58" r="1.4"><animate attributeName="opacity" dur="1.9s" begin="0.5s" repeatCount="indefinite" values="0.1;1;0.1"/></circle>
  </g>
</svg>
